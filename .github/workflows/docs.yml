name: Generate Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # allows manual trigger

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up PHP 8.3
      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl

      # Install Composer dependencies for Laravel
      - name: Install Composer dependencies
        run: |
          cd DOCKER/php/laravel/suivi-stage
          composer install --no-dev --optimize-autoloader

      # Generate Laravel backend docs with Docker
      - name: Generate Backend Docs with Docker
        run: |
          docker run --rm -v ${{ github.workspace }}/DOCKER/php/laravel/suivi-stage:/data \
                        -v ${{ github.workspace }}/docs:/output \
              phpdoc/phpdoc:latest \
              -d /data/app -t /output/backend

      # Set up Node.js for Angular
      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Install Angular dependencies
      - name: Install Angular dependencies
        run: |
          cd DOCKER/php/angular/appli-test
          npm install

      # Install Compodoc globally
      - name: Install Compodoc
        run: npm install -g @compodoc/compodoc

      # Generate Angular frontend docs
      - name: Generate Frontend Docs
        run: |
          cd DOCKER/php/angular/appli-test
          npx @compodoc/compodoc -p tsconfig.app.json -d ../../../../docs/frontend

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs

  deploy-docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: build-docs

    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs