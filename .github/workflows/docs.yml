name: Generate Docs

on:
  push:
    branches:
      - feat/AddingLaravelAndAngularDocumentation
  workflow_dispatch:  # allows manual trigger

jobs:
  build-and-deploy-docs:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up PHP 8.3
      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl

      # Install Composer dependencies for Laravel
      - name: Install Composer dependencies
        run: |
          cd DOCKER/php/laravel/suivi-stage
          composer install --no-dev --optimize-autoloader

      # Install phpDocumentor globally (latest compatible)
      - name: Install phpDocumentor
        run: composer global require phpdocumentor/phpdocumentor

      # Generate Laravel backend docs
      - name: Generate Backend Docs
        run: |
          export PATH="$HOME/.composer/vendor/bin:$PATH"
          phpdoc -d DOCKER/php/laravel/suivi-stage/app -t docs/backend

      # Set up Node.js for Angular
      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Install Angular dependencies
      - name: Install Angular dependencies
        run: |
          cd DOCKER/php/angular/appli-test
          npm install

      # Install Compodoc globally
      - name: Install Compodoc
        run: npm install -g @compodoc/compodoc

      # Generate Angular frontend docs
      - name: Generate Frontend Docs
        run: |
          cd DOCKER/php/angular/appli-test
          npx @compodoc/compodoc -p tsconfig.app.json -d ../../../../docs/frontend

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs